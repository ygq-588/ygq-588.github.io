    <script>
        (function() {
            const PASSWORD_KEY = 'site_password';
            const DEFAULT_PASSWORD = '12345';
            if (!localStorage.getItem(PASSWORD_KEY)) localStorage.setItem(PASSWORD_KEY, DEFAULT_PASSWORD);
            const gearBtn = document.getElementById('gearBtn');
            const menu = document.getElementById('settingsMenu');
            if (gearBtn && menu) {
                gearBtn.onclick = (e) => {
                    e.stopPropagation();
                    const lastAuth = localStorage.getItem('last_auth_time');
                    if (lastAuth && (Date.now() - parseInt(lastAuth)) < 10 * 60 * 1000) { menu.style.display = 'block'; return; }
                    const inputPwd = prompt('­Ъћљ У»иУЙЊтЁЦт»єуаЂ№╝џ');
                    if (inputPwd === localStorage.getItem(PASSWORD_KEY)) { localStorage.setItem('last_auth_time', Date.now()); menu.style.display = 'block'; }
                    else alert('т»єуаЂжћЎУ»»№╝Ђ');
                };
            }
            const changePwdBtn = document.getElementById('menuChangePassword');
            if (changePwdBtn) {
                changePwdBtn.onclick = (e) => {
                    e.stopPropagation();
                    const oldPwd = prompt('У»иУЙЊтЁЦтйЊтЅЇт»єуаЂ№╝џ');
                    if (oldPwd !== localStorage.getItem(PASSWORD_KEY)) { alert('тйЊтЅЇт»єуаЂжћЎУ»»№╝Ђ'); return; }
                    const newPwd = prompt('У»иУЙЊтЁЦТќ░т»єуаЂ№╝џ');
                    if (newPwd && newPwd.length > 0) { localStorage.setItem(PASSWORD_KEY, newPwd); alert('РюЁ т»єуаЂС┐«Тћ╣ТѕљтіЪ№╝Ђ'); }
                    else alert('т»єуаЂСИЇУЃйСИ║уЕ║');
                    menu.style.display = 'none';
                };
            }
        })();
    </script>

    <script>
        const TIMELINE_KEY = 'prince_timeline';
        const DIARY_KEY = 'prince_diaries';
        
        let timelines = [];
        let diaries = [];
        
        function loadData() {
            const savedTimeline = localStorage.getItem(TIMELINE_KEY);
            if (savedTimeline) timelines = JSON.parse(savedTimeline);
            else timelines = [
                { id: Date.now(), date: '2026т╣┤4Тюѕ15ТЌЦ', content: 'т«їТѕљС║єСИфС║║уйЉуФЎуЏИтєїтіЪУЃй' },
                { id: Date.now()+1, date: '2026т╣┤4Тюѕ16ТЌЦ', content: 'Тќ░тбъуФЎуѓ╣С┐АТЂ»У«Йуй«тіЪУЃй' }
            ];
            
            const savedDiary = localStorage.getItem(DIARY_KEY);
            if (savedDiary) diaries = JSON.parse(savedDiary);
            else diaries = [
                { id: Date.now()+2, date: '2026т╣┤4Тюѕ15ТЌЦ', title: 'уЏИтєїтіЪУЃйт«їТѕљ', content: 'С╗ітцЕт«їТѕљС║єуЏИтєїуџёСИіС╝асђЂтѕажЎцсђЂтѕєу▒╗тіЪУЃй№╝їТёЪУДЅтЙѕТюЅТѕљт░▒ТёЪсђѓ' },
                { id: Date.now()+3, date: '2026т╣┤4Тюѕ16ТЌЦ', title: 'уФЎуѓ╣С┐АТЂ»У«Йуй«', content: 'Тќ░тбъС║єуФЎуѓ╣С┐АТЂ»У«Йуй«тіЪУЃй№╝їтЈ»С╗ЦС┐«Тћ╣уйЉуФЎТаЄжбўсђЂтЅ»ТаЄжбўсђЂSEOуГЅсђѓ' }
            ];
            
            renderTimeline();
            renderDiary();
        }
        
        function saveTimeline() { localStorage.setItem(TIMELINE_KEY, JSON.stringify(timelines)); renderTimeline(); }
        function saveDiary() { localStorage.setItem(DIARY_KEY, JSON.stringify(diaries)); renderDiary(); }
        
        function renderTimeline() {
            const container = document.getElementById('timelineList');
            if (!container) return;
            if (timelines.length === 0) {
                container.innerHTML = '<div class="empty-msg">ТџѓТЌатцДС║ІУ«░№╝їуѓ╣тЄ╗"Тќ░тбътцДС║ІУ«░"Ти╗тіа</div>';
                return;
            }
            timelines.sort((a, b) => b.id - a.id);
            container.innerHTML = timelines.map(item => `
                <div class="timeline-item" data-id="${item.id}">
                    <span class="delete-item" data-id="${item.id}" data-type="timeline">­ЪЌЉ№ИЈ</span>
                    <div class="timeline-date">­ЪЊЁ ${item.date}</div>
                    <div class="timeline-content">${item.content}</div>
                </div>
            `).join('');
            
            document.querySelectorAll('.delete-item[data-type="timeline"]').forEach(btn => {
                btn.onclick = (e) => { e.stopPropagation(); deleteTimeline(parseInt(btn.dataset.id)); };
            });
        }
        
        function renderDiary() {
            const container = document.getElementById('diaryList');
            if (!container) return;
            if (diaries.length === 0) {
                container.innerHTML = '<div class="empty-msg">ТџѓТЌаТЌЦУ«░№╝їуѓ╣тЄ╗"Тќ░тбъТЌЦУ«░"Ти╗тіа</div>';
                return;
            }
            diaries.sort((a, b) => b.id - a.id);
            container.innerHTML = diaries.map(item => `
                <div class="diary-item" data-id="${item.id}">
                    <span class="delete-item" data-id="${item.id}" data-type="diary">­ЪЌЉ№ИЈ</span>
                    <div class="diary-date">­ЪЊЁ ${item.date}</div>
                    <div class="diary-title">${item.title}</div>
                    <div class="diary-preview">${item.content.substring(0, 80)}${item.content.length > 80 ? '...' : ''}</div>
                </div>
            `).join('');
            
            document.querySelectorAll('.delete-item[data-type="diary"]').forEach(btn => {
                btn.onclick = (e) => { e.stopPropagation(); deleteDiary(parseInt(btn.dataset.id)); };
            });
            
            document.querySelectorAll('.diary-item').forEach(el => {
                const id = parseInt(el.dataset.id);
                el.onclick = () => { window.location.href = `diary-detail.html?id=${id}`; };
            });
        }
        
        function deleteTimeline(id) {
            if (confirm('уА«т«џтѕажЎцУ┐ЎТЮАтцДС║ІУ«░№╝Ъ')) {
                timelines = timelines.filter(item => item.id !== id);
                saveTimeline();
            }
        }
        
        function deleteDiary(id) {
            if (confirm('уА«т«џтѕажЎцУ┐Ўу»ЄТЌЦУ«░№╝Ъ')) {
                diaries = diaries.filter(item => item.id !== id);
                saveDiary();
            }
        }
        
        function showAddTimelineModal() {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal-content">
                    <h3>Тќ░тбътцДС║ІУ«░</h3>
                    <input type="text" id="timelineDate" placeholder="ТЌЦТюЪ№╝ѕтдѓ№╝џ2026т╣┤4Тюѕ15ТЌЦ№╝Ѕ" value="${new Date().toLocaleDateString()}">
                    <textarea id="timelineContent" rows="3" placeholder="тцДС║ІУ«░тєЁт«╣"></textarea>
                    <div class="modal-buttons">
                        <button class="btn-cancel" id="cancelBtn">тЈќТХѕ</button>
                        <button class="btn-save" id="saveBtn">С┐ЮтГў</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            document.getElementById('cancelBtn').onclick = () => modal.remove();
            document.getElementById('saveBtn').onclick = () => {
                const date = document.getElementById('timelineDate').value;
                const content = document.getElementById('timelineContent').value;
                if (date && content) {
                    timelines.push({ id: Date.now(), date, content });
                    saveTimeline();
                    modal.remove();
                } else alert('У»итАФтєЎт«їТЋ┤С┐АТЂ»');
            };
        }
        
        function showAddDiaryModal() {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal-content">
                    <h3>Тќ░тбъТЌЦУ«░</h3>
                    <input type="text" id="diaryDate" placeholder="ТЌЦТюЪ№╝ѕтдѓ№╝џ2026т╣┤4Тюѕ15ТЌЦ№╝Ѕ" value="${new Date().toLocaleDateString()}">
                    <input type="text" id="diaryTitle" placeholder="ТаЄжбў">
                    <textarea id="diaryContent" rows="5" placeholder="ТЌЦУ«░тєЁт«╣"></textarea>
                    <div class="modal-buttons">
                        <button class="btn-cancel" id="cancelBtn">тЈќТХѕ</button>
                        <button class="btn-save" id="saveBtn">С┐ЮтГў</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            document.getElementById('cancelBtn').onclick = () => modal.remove();
            document.getElementById('saveBtn').onclick = () => {
                const date = document.getElementById('diaryDate').value;
                const title = document.getElementById('diaryTitle').value;
                const content = document.getElementById('diaryContent').value;
                if (date && title && content) {
                    diaries.push({ id: Date.now(), date, title, content });
                    saveDiary();
                    modal.remove();
                } else alert('У»итАФтєЎт«їТЋ┤С┐АТЂ»');
            };
        }
        
        document.getElementById('addTimelineBtn')?.addEventListener('click', showAddTimelineModal);
        document.getElementById('addDiaryBtn')?.addEventListener('click', showAddDiaryModal);
        
        loadData();
    </script>
